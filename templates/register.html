<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - Корочки.есть</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Регистрация</h1>

      {% if error %}<div class="error">{{ error }}</div>{% endif %}

      <form method="post">
        <div class="form-group">
          <input type="text" name="login" placeholder="Логин (лат. буквы, цифры, от 6 символов)" required>
        </div>
        <div class="form-group">
          <input type="password" name="password" placeholder="Пароль (минимум 8 символов)" required>
        </div>
        <div class="form-group">
          <input type="text" name="full_name" placeholder="ФИО (только кириллица)" required>
        </div>
        <div class="form-group">
          <input type="text" id="phone" name="phone" placeholder="Телефон: 8(XXX)XXX-XX-XX" required>
        </div>
        <div class="form-group">
          <input type="email" name="email" placeholder="Email" required>
        </div>
        <button type="submit">Создать пользователя</button>
      </form>

      <div class="links">
        <a href="{{ url_for('login') }}">Уже зарегистрированы? Войти</a>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
