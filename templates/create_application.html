<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новая заявка - Корочки.есть</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Подать заявку</h1>

      <form method="post">
        <div class="form-group">
          <input type="text" name="course_name" placeholder="Наименование курса" required>
        </div>
        <div class="form-group">
          <input type="date" name="start_date" required>
        </div>
        <div class="form-group">
          <select name="payment_method" required>
            <option value="">Выберите способ оплаты</option>
            <option value="Наличные">Наличные</option>
            <option value="Перевод по номеру телефона">Перевод по номеру телефона</option>
          </select>
        </div>
        <button type="submit">Отправить</button>
      </form>

      <div class="links">
        <a href="{{ url_for('applications') }}">← Мои заявки</a>
      </div>
    </div>
  </div>
</body>

</html>
